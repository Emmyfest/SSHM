<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-SHM | Settings</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script>renderLayout({ activePage: "settings", title: "Settings", subtitle: "" });</script>

  <template id="content-template">
    <div class="panel" style="max-width:560px;">
      <div class="panel-header"><div class="panel-title">Alert thresholds</div></div>
      <div class="field"><label>Strain danger threshold</label><input id="s-strain" type="number"></div>
      <div class="field"><label>Vibration danger threshold (g)</label><input id="s-vibration" type="number" step="0.01"></div>
      <div class="field"><label>Tilt danger threshold (&deg;)</label><input id="s-tilt" type="number" step="0.1"></div>
      <div class="field"><label>Battery low threshold (V)</label><input id="s-battery" type="number" step="0.1"></div>
      <button class="btn btn-primary" id="save-thresholds">Save thresholds</button>
    </div>

    <div class="panel" style="max-width:560px;">
      <div class="panel-header"><div class="panel-title">Profile</div></div>
      <div class="field"><label>Username</label><input id="s-username" disabled></div>
      <div class="field"><label>New password</label><input id="s-password" type="password" placeholder="Leave blank to keep current password"></div>
      <button class="btn btn-primary" id="save-profile">Save profile</button>
    </div>

    <div id="settings-status" class="text-faint" style="font-size:12.5px;"></div>
  </template>

  <script src="js/settings.js"></script>
</body>
</html>
